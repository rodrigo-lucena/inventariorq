<div class="tab-pane" style="padding: 5px 5px 5px 5px">
			    <section class="content-header" >
						<h1><i class="far fa-bell" style="color: black"></i> Solicitações de acesso</h1>
					</section>
					<section class="content">
						<div class="box-body no-padding">
					              <table class="table table-striped fs-4">
					                <thead>
					                  <tr style="text-align: left">
					                    <th >Nome</th>
					                    <th >Sobrenome</th>
					                    <th >Email</th>
					                    <th >Login</th>
					                    <th >Vínculo</th>
					                    <th style="width: 40px">Conta</th>
					                    <th >&nbsp;</th>
					                  </tr>
					                </thead>
					                <tbody>
					                {loop="$users"}
					                  <tr style="text-align: left">
					                    <td >{$value.nome}</td>
					                    <td>{$value.sobrenome}</td>
					                    <td>{$value.email}</td>
					                    <td>{$value.login}</td>
					                    <td>{$value.responsavel}</td>
					                    <td>{if="$value.tipo == 0"}Administrador{else}Usuário{/if}</td>
					                    <td style="text-align: right">
					                      <a href="" class="btn btn-primary btn-xs"><i class="fa fa-edit"></i> Editar</a>
					                      <a href="/consulta" onclick="return confirm('Deseja realmente excluir este usuário?')" class="btn btn-danger btn-xs"><i class="fa fa-trash"></i> Excluir</a>
					                    </td>
					                  </tr>
					                  {/loop}  
					                </tbody>
					              </table>
					            </div>
					        </session>
					        
</div>
